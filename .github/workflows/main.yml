name: Pure C ASM Test

on: [push, workflow_dispatch]

jobs:
  test-asm:
    runs-on: macos-latest  # 必须用 macOS 跑 arm64 汇编
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Evaluator
        run: |
          # 运行评估脚本
          # 它会自动寻找 generated_asm 文件夹并链接其中的 .s 文件
          python eval_asm.py
