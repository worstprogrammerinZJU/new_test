name: ARM64 Assembly macOS Test

on: [push, workflow_dispatch]

jobs:
  test-asm:
    runs-on: macos-latest  # 必须在 macOS 上原生测试 ARM64 汇编
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Evaluator
        run: |
          # 确保汇编文件夹存在
          if [ ! -d "generated_asm" ]; then echo "Folder not found"; exit 1; fi
          # 执行评估逻辑
          python eval_asm.py
